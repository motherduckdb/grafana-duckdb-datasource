name: Build static musl plugin (Zig)

# Cross-compiles the plugin backend for Alpine / musl using `zig cc`, producing a
# FULLY STATIC binary with no glibc or libstdc++ runtime dependency — so it loads
# and runs on Alpine-based Grafana images. Addresses #80.
#
# The entire build is a cross-compile from a standard x86_64 Linux runner, so it
# needs NO QEMU (unlike the existing emulated linux/arm64 job). QEMU/binfmt is only
# used for the optional cross-arch smoke test at the end.
#
# Proof of concept / reference: https://github.com/samjewell/zig-cc-lab

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

env:
  # Must track the DuckDB version pinned by duckdb-go-bindings (via duckdb-go/v2 in
  # go.mod): v2.10504.0 -> bindings v0.10504.0 -> DuckDB v1.5.4.
  DUCKDB_VERSION: v1.5.4
  ZIG_VERSION: 0.16.0

jobs:
  build-musl:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            zigtarget: x86_64-linux-musl
            platform: linux/amd64
          - goarch: arm64
            zigtarget: aarch64-linux-musl
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: |
          set -euo pipefail
          curl -fL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
          /tmp/zig-x86_64-linux-${ZIG_VERSION}/zig version

      # Only arm64 needs this: the aarch64 cross-compile of the 25 MB amalgamation
      # exhausts the runner's RAM. amd64 builds fine without extra swap.
      - name: Add swap (replace the runner's small default swapfile)
        if: matrix.goarch == 'arm64'
        run: |
          set -e
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          sudo fallocate -l 13G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=13312
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Cache static libduckdb.a (${{ matrix.zigtarget }})
        id: cache-libduckdb
        uses: actions/cache@v4
        with:
          path: libduckdb-${{ matrix.goarch }}-musl
          key: libduckdb-${{ matrix.zigtarget }}-${{ env.DUCKDB_VERSION }}-zig${{ env.ZIG_VERSION }}

      - name: Build static libduckdb.a from the DuckDB amalgamation (~5-8 min)
        if: steps.cache-libduckdb.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fL -o libduckdb-src.zip \
            "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/libduckdb-src.zip"
          unzip -q libduckdb-src.zip
          mkdir -p "libduckdb-${{ matrix.goarch }}-musl"
          # One 25 MB translation unit; single-threaded, hence the runtime.
          zig c++ -target ${{ matrix.zigtarget }} -std=c++11 -O2 -DNDEBUG -fPIC -w \
            -c duckdb.cpp -o duckdb.o
          zig ar rcs "libduckdb-${{ matrix.goarch }}-musl/libduckdb.a" duckdb.o
          rm -f duckdb.o duckdb.cpp duckdb.hpp duckdb.h duckdb_extension.h libduckdb-src.zip

      - name: Build plugin backend (static, musl)
        run: |
          set -euo pipefail
          LIBDIR="$PWD/libduckdb-${{ matrix.goarch }}-musl"
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.goarch }} \
            CC="zig cc -target ${{ matrix.zigtarget }}" \
            CXX="zig c++ -target ${{ matrix.zigtarget }}" \
            CGO_LDFLAGS="-L$LIBDIR -lduckdb -lc++ -lc++abi -lm" \
            go build -tags duckdb_use_static_lib \
              -ldflags '-linkmode external -extldflags "-static"' \
              -o "dist/gpx_duckdb_datasource_linux_${{ matrix.goarch }}" ./pkg
          file "dist/gpx_duckdb_datasource_linux_${{ matrix.goarch }}"

      - name: Smoke test on Alpine (musl)
        run: |
          set -euo pipefail
          docker run --privileged --rm tonistiigi/binfmt --install all
          out=$(docker run --rm --platform ${{ matrix.platform }} -v "$PWD/dist:/w" -w /w \
                  alpine:3.20 sh -c 'timeout 10 ./gpx_duckdb_datasource_linux_${{ matrix.goarch }} 2>&1 || true')
          echo "$out"
          echo "$out" | grep -q "This binary is a plugin" \
            || { echo "::error::plugin binary failed to load/run on Alpine"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: gpx_duckdb_datasource_linux_${{ matrix.goarch }}_musl
          path: dist/gpx_duckdb_datasource_linux_${{ matrix.goarch }}
          retention-days: 5
