name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - cloud
  pull_request:
    branches:
      - main

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.16.0

jobs:
  build-linux:
    name: Build Linux ${{ matrix.goarch }} (static musl)
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            zigtarget: x86_64-linux-musl
            platform: linux/amd64
            artifact: linux-amd64-dist
            run-coverage: true
          - goarch: arm64
            zigtarget: aarch64-linux-musl
            platform: linux/arm64
            artifact: linux-arm64-dist
            run-coverage: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run Go coverage
        if: matrix.run-coverage
        uses: magefile/mage-action@v3
        with:
          version: latest
          args: coverage

      - name: Resolve DuckDB release version
        id: duckdb
        shell: bash
        run: |
          set -euo pipefail

          duckdb_go_version="$(go list -m -f '{{.Version}}' github.com/duckdb/duckdb-go/v2)"
          bindings_version="$(go list -m -f '{{.Version}}' github.com/duckdb/duckdb-go-bindings)"
          expected_bindings_version="${duckdb_go_version/v2./v0.}"

          if [ "$bindings_version" != "$expected_bindings_version" ]; then
            echo "::error::duckdb-go ($duckdb_go_version) and duckdb-go-bindings ($bindings_version) are out of sync"
            exit 1
          fi

          encoded="${duckdb_go_version#v2.}"
          encoded="${encoded%%.*}"
          if ! [[ "$encoded" =~ ^[0-9]{5}$ ]]; then
            echo "::error::cannot derive DuckDB release version from duckdb-go version: $duckdb_go_version"
            exit 1
          fi

          major="${encoded:0:1}"
          minor_raw="${encoded:1:2}"
          patch_raw="${encoded:3:2}"
          duckdb_version="v${major}.$((10#$minor_raw)).$((10#$patch_raw))"

          echo "duckdb-go: $duckdb_go_version"
          echo "duckdb-go-bindings: $bindings_version"
          echo "duckdb release: $duckdb_version"
          echo "version=$duckdb_version" >> "$GITHUB_OUTPUT"

      - name: Install Zig ${{ env.ZIG_VERSION }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq xz-utils unzip

          curl -fsSL https://ziglang.org/download/index.json -o /tmp/zig-index.json
          zig_url="$(jq -r --arg v "$ZIG_VERSION" '.[$v]["x86_64-linux"].tarball' /tmp/zig-index.json)"
          zig_sha="$(jq -r --arg v "$ZIG_VERSION" '.[$v]["x86_64-linux"].shasum' /tmp/zig-index.json)"

          curl -fsSL "$zig_url" -o /tmp/zig.tar.xz
          echo "$zig_sha  /tmp/zig.tar.xz" | sha256sum --check -
          zig_dir="$(tar -tf /tmp/zig.tar.xz | awk -F/ 'NR == 1 { print $1 }')"
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/$zig_dir" >> "$GITHUB_PATH"
          "/tmp/$zig_dir/zig" version

      # Only arm64 needs this: the aarch64 cross-compile of the DuckDB
      # amalgamation exhausts the runner's RAM without extra swap.
      - name: Add swap for arm64 DuckDB build
        if: matrix.goarch == 'arm64'
        run: |
          set -e
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          sudo fallocate -l 13G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=13312
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Cache static libduckdb.a (${{ matrix.zigtarget }})
        id: cache-libduckdb
        uses: actions/cache@v4
        with:
          path: libduckdb-${{ matrix.goarch }}-musl
          key: libduckdb-${{ matrix.zigtarget }}-${{ steps.duckdb.outputs.version }}-zig${{ env.ZIG_VERSION }}

      - name: Build static libduckdb.a from the DuckDB amalgamation
        if: steps.cache-libduckdb.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fL -o libduckdb-src.zip \
            "https://github.com/duckdb/duckdb/releases/download/${{ steps.duckdb.outputs.version }}/libduckdb-src.zip"
          unzip -q libduckdb-src.zip
          mkdir -p "libduckdb-${{ matrix.goarch }}-musl"
          # One large translation unit; single-threaded, hence the runtime.
          zig c++ -target ${{ matrix.zigtarget }} -std=c++11 -O2 -DNDEBUG -fPIC -w \
            -c duckdb.cpp -o duckdb.o
          zig ar rcs "libduckdb-${{ matrix.goarch }}-musl/libduckdb.a" duckdb.o
          rm -f duckdb.o duckdb.cpp duckdb.hpp duckdb.h duckdb_extension.h libduckdb-src.zip

      - name: Build plugin backend (static, musl)
        run: |
          set -euo pipefail
          mkdir -p dist
          LIBDIR="$PWD/libduckdb-${{ matrix.goarch }}-musl"
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.goarch }} \
            CC="zig cc -target ${{ matrix.zigtarget }}" \
            CXX="zig c++ -target ${{ matrix.zigtarget }}" \
            CGO_LDFLAGS="-L$LIBDIR -lduckdb -lc++ -lc++abi -lm" \
            go build -tags duckdb_use_static_lib \
              -ldflags '-linkmode external -extldflags "-static"' \
              -o "dist/gpx_duckdb_datasource_linux_${{ matrix.goarch }}" ./pkg
          file "dist/gpx_duckdb_datasource_linux_${{ matrix.goarch }}"

      - name: Set up QEMU for arm64 smoke test
        if: matrix.goarch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Smoke test on Alpine
        run: |
          set -euo pipefail
          out=$(docker run --rm --platform ${{ matrix.platform }} -v "$PWD/dist:/w" -w /w \
                  alpine:3.20 sh -c 'timeout 10 ./gpx_duckdb_datasource_linux_${{ matrix.goarch }} 2>&1 || true')
          echo "$out"
          echo "$out" | grep -q "This binary is a plugin" \
            || { echo "::error::plugin binary failed to load/run on Alpine"; exit 1; }

      - name: Upload Linux ${{ matrix.goarch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          retention-days: 5


  build-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: install mage
        run: |
          go install github.com/magefile/mage@latest
          mage coverage
          mage -v build:DarwinARM64
      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dist
          path: dist/
          retention-days: 5

  build-macos-amd64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: install mage
        run: |
          go install github.com/magefile/mage@latest
          mage coverage
          mage -v build:Darwin
      - name: Upload macOS AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-amd64-dist
          path: dist/
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: magefile/mage-action@v3
        with:
          version: latest
          args: coverage
      - uses: magefile/mage-action@v3
        with:
          version: latest
          args: -v build:Windows
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/
          retention-days: 5

  generate-manifest:
    needs: [build-linux, build-macos-arm64, build-macos-amd64, build-windows]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Prepare dist directory
        run: |
          mkdir -p dist
          cp -r all-artifacts/*/gpx_duckdb_datasource* dist/

      - uses: magefile/mage-action@v3
        with:
          version: latest
          args: -v build:GenerateManifestFile
      - name: Upload final artifacts with manifest
        uses: actions/upload-artifact@v4
        with:
          name: final-dist
          path: dist/
          retention-days: 5

  build:
    name: Build, lint and unit tests
    runs-on: ubuntu-22.04
    needs: generate-manifest
    outputs:
      plugin-id: ${{ steps.metadata.outputs.plugin-id }}
      plugin-version: ${{ steps.metadata.outputs.plugin-version }}
      has-e2e: ${{ steps.check-for-e2e.outputs.has-e2e }}
      has-backend: ${{ steps.check-for-backend.outputs.has-backend }}
      archive-sha1sum: ${{ steps.metadata.outputs.archive-sha1sum }}
    env:
      GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check types
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:ci
      - name: Build frontend
        run: npm run build

      - name: Check for backend
        id: check-for-backend
        run: |
          if [ -f "Magefile.go" ]
          then
            echo "has-backend=true" >> $GITHUB_OUTPUT
          fi
      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download backend dist directory
        run: |
          mkdir -p dist
          cp -r all-artifacts/final-dist/* dist/

      - name: Check for E2E
        id: check-for-e2e
        run: |
          if [ -f "playwright.config.ts" ]
          then
            echo "has-e2e=true" >> $GITHUB_OUTPUT
          fi

      - name: Sign plugin
        run: npm run sign
        if: ${{ env.GRAFANA_ACCESS_POLICY_TOKEN != '' }}

      - name: Get plugin metadata
        id: metadata
        run: |
          sudo apt-get install jq

          export GRAFANA_PLUGIN_ID=$(cat dist/plugin.json | jq -r .id)
          export GRAFANA_PLUGIN_VERSION=$(cat dist/plugin.json | jq -r .info.version)
          export GRAFANA_PLUGIN_ARTIFACT=${GRAFANA_PLUGIN_ID}-${GRAFANA_PLUGIN_VERSION}.zip
          export GRAFANA_PLUGIN_ARTIFACT_SHA1SUM=${GRAFANA_PLUGIN_ARTIFACT}.sha1

          echo "plugin-id=${GRAFANA_PLUGIN_ID}" >> $GITHUB_OUTPUT
          echo "plugin-version=${GRAFANA_PLUGIN_VERSION}" >> $GITHUB_OUTPUT
          echo "archive=${GRAFANA_PLUGIN_ARTIFACT}" >> $GITHUB_OUTPUT
          echo "archive-sha1sum=${GRAFANA_PLUGIN_ARTIFACT_SHA1SUM}" >> $GITHUB_OUTPUT

      - name: Add execute permissions on binary
        run: |
          chmod +x ./dist/gpx_*

      - name: Package plugin
        id: package-plugin
        run: |
          mv dist ${{ steps.metadata.outputs.plugin-id }}
          zip -r ${{ steps.metadata.outputs.archive }} ${{ steps.metadata.outputs.plugin-id }}
          sha1sum ${{ steps.metadata.outputs.archive }} | cut -f1 -d' ' > ${{ steps.metadata.outputs.archive-sha1sum }}
          mv ${{ steps.metadata.outputs.archive }} ${{ steps.metadata.outputs.plugin-id }}

      - name: Archive Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.plugin-id }}-${{ steps.metadata.outputs.plugin-version }}
          path: ${{ steps.metadata.outputs.plugin-id }}


  resolve-versions:
    name: Resolve e2e images
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    needs: build
    if: ${{ needs.build.outputs.has-e2e == 'true' }}
    outputs:
      matrix: ${{ steps.filter-supported-versions.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Resolve Grafana E2E versions
        id: resolve-versions
        uses: grafana/plugin-actions/e2e-version@e2e-version/v2.0.0
        with:
          # @grafana/plugin-e2e parses GRAFANA_VERSION as semver and fails on "nightly".
          skip-grafana-nightly-image: true
      - name: Filter unsupported Grafana versions
        id: filter-supported-versions
        env:
          MATRIX: ${{ steps.resolve-versions.outputs.matrix }}
        run: |
          set -euo pipefail
          # Grafana 13 currently fails to load the frontend bundle with React 19.
          # Track and re-enable 13.x e2e coverage separately in #95.
          matrix=$(jq -c '[.[] | . + {NAME: (.NAME // .name), VERSION: (.VERSION // .version)} | select((.VERSION | split(".")[0] | tonumber) < 13)]' <<< "$MATRIX")
          if [ "$matrix" = "[]" ]; then
            echo "::error::No supported Grafana e2e versions remain after filtering"
            exit 1
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  playwright-tests:
    needs: [resolve-versions, build]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        GRAFANA_IMAGE: ${{fromJson(needs.resolve-versions.outputs.matrix)}}
    name: e2e test ${{ matrix.GRAFANA_IMAGE.name }}@${{ matrix.GRAFANA_IMAGE.VERSION }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download plugin
        uses: actions/download-artifact@v4
        with:
          path: dist
          name: ${{ needs.build.outputs.plugin-id }}-${{ needs.build.outputs.plugin-version }}

      - name: Execute permissions on binary
        if: needs.build.outputs.has-backend == 'true'
        run: |
          ls 
          ls dist/
          chmod +x ./dist/gpx_*

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: Start Grafana
        run: |
          docker compose pull
          DEVELOPMENT=false GRAFANA_VERSION=${{ matrix.GRAFANA_IMAGE.VERSION }} GRAFANA_IMAGE=${{ matrix.GRAFANA_IMAGE.NAME }} docker compose up -d

      - name: Wait for Grafana to start
        uses: nev7n/wait_for_response@v1
        with:
          url: 'http://localhost:3000/'
          responseCode: 200
          timeout: 60000
          interval: 500

      - name: Install Playwright Browsers
        run: npm exec playwright install chromium --with-deps

      - name: Run Playwright tests
        id: run-tests
        env:
          GRAFANA_VERSION: ${{ matrix.GRAFANA_IMAGE.VERSION }}
        run: npm run e2e

      - name: Docker logs
        if: ${{ always() && steps.run-tests.outcome == 'failure' }}
        run: |
          docker logs motherduck-duckdb-datasource >& grafana-server.log

      - name: Stop grafana docker
        run: docker compose down

      - name: Upload server log
        uses: actions/upload-artifact@v4
        if: ${{ always() && steps.run-tests.outcome == 'failure' }}
        with:
          name: ${{ matrix.GRAFANA_IMAGE.NAME }}-v${{ matrix.GRAFANA_IMAGE.VERSION }}-${{github.run_id}}-server-log
          path: grafana-server.log
          retention-days: 5

      # Uncomment this step to upload the Playwright report to Github artifacts.
      # If your repository is public, the report will be public on the Internet so beware not to expose sensitive information.
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() && steps.run-tests.outcome == 'failure' }}
        with:
          name: playwright-report-${{ matrix.GRAFANA_IMAGE.NAME }}-v${{ matrix.GRAFANA_IMAGE.VERSION }}-${{github.run_id}}
          path: playwright-report/
          retention-days: 5

  check-version-bump:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff

      - id: check
        run: |
          PREV=$(git show HEAD~1:package.json | jq -r '.version')
          CURR=$(jq -r '.version' package.json)
          if [ "$PREV" != "$CURR" ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
            echo "version=v${CURR}" >> $GITHUB_OUTPUT
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: [check-version-bump, playwright-tests]
    if: needs.check-version-bump.outputs.bumped == 'true' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.check-version-bump.outputs.version }}
    secrets: inherit
